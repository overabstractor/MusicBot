<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Now Playing (Vertical) – MusicBot</title>
  <script src="../shared/theme.js"></script>
  <link rel="stylesheet" href="../shared/overlay.css">
  <style>
    body { display: flex; justify-content: center; align-items: flex-end; }

    .npv-card {
      width: 320px;
      border-radius: 20px;
      overflow: hidden;
      position: relative;
      background: rgba(12,12,20,0.88);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 16px 48px rgba(0,0,0,0.7);
      animation: slideInUp 0.55s cubic-bezier(0.16,1,0.3,1) both;
      transition: opacity 0.3s;
    }
    .npv-card.fading-out { opacity: 0; }
    .npv-card.paused .npv-cover { opacity: 0.55; filter: grayscale(30%); }

    /* Blurred album-art backdrop inside the card */
    .npv-bg {
      position: absolute; inset: 0;
      background-size: cover; background-position: center;
      filter: blur(40px) brightness(0.28); transform: scale(1.4);
      z-index: 0;
    }

    .npv-content { position: relative; z-index: 1; }

    /* Album art — vinyl disc */
    .npv-cover-wrap {
      display: flex; justify-content: center;
      padding: 22px 22px 0;
    }
    .npv-vinyl {
      width: 260px; height: 260px;
      font-size: 260px; /* base for .vinyl-note % font-size */
      transition: opacity 0.4s, filter 0.4s;
    }
    .npv-card.paused .npv-vinyl { opacity: 0.55; filter: grayscale(30%); }

    /* Song info */
    .npv-info {
      padding: 18px 22px 20px;
      display: flex; flex-direction: column; gap: 4px;
    }

    .npv-title {
      font-size: 20px; font-weight: 800;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      line-height: 1.25;
    }
    .npv-artist {
      font-size: 13px; font-weight: 600;
      color: rgba(255,255,255,0.6);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      text-transform: uppercase; letter-spacing: 0.08em;
    }
    .npv-requested {
      font-size: 11px; font-weight: 600;
      color: rgba(167,139,250,0.9);
      display: flex; align-items: center; gap: 4px;
      white-space: nowrap; overflow: hidden;
    }

    /* Progress */
    .npv-progress { margin-top: 10px; }
    .npv-bar-track {
      width: 100%; height: 3px;
      background: rgba(255,255,255,0.18); border-radius: 2px; overflow: hidden;
    }
    .npv-bar-fill {
      height: 100%; background: #a78bfa; border-radius: 2px;
      transition: width 1s linear;
    }
    .npv-time-row {
      display: flex; justify-content: space-between;
      font-size: 10px; font-variant-numeric: tabular-nums;
      color: rgba(255,255,255,0.4); margin-top: 4px;
    }

    /* Paused indicator */
    .npv-paused-badge {
      display: none;
      position: absolute; top: 12px; right: 12px;
      background: rgba(0,0,0,0.55); border-radius: 8px;
      padding: 3px 10px; font-size: 10px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: rgba(255,255,255,0.65); z-index: 5;
    }
    .npv-card.paused .npv-paused-badge { display: block; }
  </style>
</head>
<body>
  <div id="card" class="npv-card hidden">
    <div id="npv-bg"       class="npv-bg"></div>
    <div class="npv-paused-badge">⏸ Pausado</div>
    <div class="npv-content">
      <div class="npv-cover-wrap">
        <div id="npv-vinyl" class="vinyl-disc npv-vinyl no-cover">
          <img id="npv-cover" class="vinyl-art" src="" alt="">
          <span class="vinyl-note">♫</span>
        </div>
      </div>
      <div class="npv-info">
        <div class="np-scroll-wrap"><div id="npv-title"  class="npv-title"></div></div>
        <div class="np-scroll-wrap"><div id="npv-artist" class="npv-artist"></div></div>
        <div id="npv-requested" class="npv-requested hidden"></div>
        <div class="npv-progress">
          <div class="npv-bar-track"><div id="npv-bar" class="npv-bar-fill" style="width:0%"></div></div>
          <div class="npv-time-row">
            <span id="npv-cur">0:00</span>
            <span id="npv-dur">0:00</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.7/signalr.min.js"></script>
  <script src="../shared/signalr-client.js"></script>
  <script src="../shared/toast.js"></script>
  <script>
    const PLATFORM_MAP = {
      twitch:{label:"Twitch",cls:"platform-twitch"}, tiktok:{label:"TikTok",cls:"platform-tiktok"},
      tikfinity:{label:"TikTok",cls:"platform-tiktok"}, youtube:{label:"YouTube",cls:"platform-youtube"},
      kick:{label:"Kick",cls:"platform-kick"}, web:{label:"Web",cls:"platform-web"}, http:{label:"Web",cls:"platform-web"},
    };
    function badge(p) { const i=p&&PLATFORM_MAP[p.toLowerCase()]; return i?`<span class="platform-badge ${i.cls}">${i.label}</span>`:""; }
    function esc(t) { const d=document.createElement("div"); d.textContent=t; return d.innerHTML; }
    function fmt(ms) { const s=Math.floor(ms/1000); return `${Math.floor(s/60)}:${(s%60).toString().padStart(2,"0")}`; }

    const card   = document.getElementById("card");
    const bg     = document.getElementById("npv-bg");
    const vinyl  = document.getElementById("npv-vinyl");
    const cover  = document.getElementById("npv-cover");
    const title  = document.getElementById("npv-title");
    const artist = document.getElementById("npv-artist");
    const req    = document.getElementById("npv-requested");
    const bar    = document.getElementById("npv-bar");
    const cur    = document.getElementById("npv-cur");
    const dur    = document.getElementById("npv-dur");

    cover.onerror = () => { vinyl.classList.add("no-cover"); };

    let currentUri=null, transitioning=false, progressMs=0, durationMs=0, isPlaying=false, ticker=null;

    function startTick() { if(ticker) return; ticker=setInterval(()=>{ if(!isPlaying) return; progressMs=Math.min(progressMs+200,durationMs); renderBar(); },200); }
    function stopTick()  { clearInterval(ticker); ticker=null; }
    function renderBar() { const pct=durationMs>0?Math.min(progressMs/durationMs*100,100):0; bar.style.width=`${pct}%`; cur.textContent=fmt(progressMs); dur.textContent=fmt(durationMs); }

    function applyMarquee(el) {
      el.classList.remove("scrolling");
      el.style.removeProperty("--marquee-end");
      el.style.removeProperty("--marquee-dur");
      requestAnimationFrame(() => {
        const overflow = el.scrollWidth - el.parentElement.clientWidth;
        if (overflow > 4) {
          const scrollSec = Math.max(3, overflow / 60);
          const total = parseFloat((scrollSec * 2 + 4).toFixed(1));
          el.style.setProperty("--marquee-end", `-${overflow}px`);
          el.style.setProperty("--marquee-dur", `${total}s`);
          el.classList.add("scrolling");
        }
      });
    }

    function applyContent(song, state) {
      const rb=(state.item&&state.item.requestedBy)||song.requestedBy;
      const pl=(state.item&&state.item.platform)||song.platform;
      const hasCover = song.coverUrl && song.coverUrl.trim() !== "";
      vinyl.classList.toggle("no-cover", !hasCover);
      bg.style.backgroundImage = hasCover ? `url(${song.coverUrl})` : "none";
      cover.src = hasCover ? song.coverUrl : "";
      title.textContent=song.title; artist.textContent=song.artist;
      applyMarquee(title); applyMarquee(artist);
      if(rb){ req.innerHTML=`${badge(pl)} ♪ ${esc(rb)}`; req.classList.remove("hidden"); }
      else  { req.classList.add("hidden"); }
    }

    function update(state) {
      const song=state&&(state.spotifyTrack||(state.item&&state.item.song));
      if(state){ progressMs=state.progressMs||0; isPlaying=state.isPlaying||false; durationMs=song?song.durationMs:0; isPlaying?startTick():stopTick(); renderBar(); }
      vinyl.classList.toggle("playing", !!isPlaying && !!song);
      if(song) card.classList.toggle("paused",!isPlaying);
      if(!song){ if(!card.classList.contains("hidden")){ card.classList.add("fading-out"); setTimeout(()=>{ card.classList.add("hidden"); card.classList.remove("fading-out"); currentUri=null; },300); } stopTick(); return; }
      const isNew=currentUri!==song.spotifyUri;
      if(card.classList.contains("hidden")){ applyContent(song,state); card.classList.remove("hidden"); currentUri=song.spotifyUri; return; }
      if(isNew&&!transitioning){ transitioning=true; card.classList.add("fading-out"); setTimeout(()=>{ applyContent(song,state); card.classList.remove("fading-out"); currentUri=song.spotifyUri; transitioning=false; },280); }
    }

    let _signalrReady = false;
    const conn=new OverlayConnection("/hub/overlay");
    conn.on("nowplaying:updated",(s)=>{ _signalrReady=true; update(s); })
        .on("queue:updated",(s)=>{ if(s?.nowPlaying){ _signalrReady=true; update(s.nowPlaying); } });

    const _initToken = new URLSearchParams(window.location.search).get("token") || "local";
    fetch(`/api/queue/public/${encodeURIComponent(_initToken)}/now-playing`)
      .then(r => r.ok ? r.json() : null)
      .then(state => { if (state && !_signalrReady) update(state); })
      .catch(() => {});

    conn.start();
  </script>
</body>
</html>
