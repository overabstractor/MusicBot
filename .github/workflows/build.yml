name: Build

on:
  push:
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      version:
        description: 'Versión a compilar y subir a la release (ej. 1.0.0)'
        required: false
        default: ''

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/MusicBot.Web/clientapp/package-lock.json

      - name: Install vpk
        run: |
          dotnet tool install -g vpk
          echo "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Extract version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          elif [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && -n "${{ inputs.version }}" ]]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=0.0.1" >> $GITHUB_OUTPUT
          fi

      - name: Pack
        shell: bash
        run: ./build.cmd --target Pack --configuration Release --runtime win-x86 --version ${{ steps.version.outputs.version }}

      - name: Create release with installer
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.version != '')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: MusicBot v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: artifacts/**

      - name: Upload artifact (PR / manual without version)
        if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && inputs.version == '')
        uses: actions/upload-artifact@v4
        with:
          name: MusicBot-win-x86
          path: artifacts/
          retention-days: 7
